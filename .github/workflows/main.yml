name: Auto Release

on:
  push:
    tags:
      - 'v*' # Triggers when you push a tag like v1.0.0
  workflow_dispatch:

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Crucial: Fetches all history so we can compare with the previous tag

      - name: Generate Release Notes
        id: changelog
        run: |
          # 1. Find the previous tag. If this is the very first tag, fallback to the first commit ever.
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || git rev-list --max-parents=0 HEAD)
          echo "Comparing $PREV_TAG to HEAD"

          # 2. Create the release notes file
          echo "# What's New in ${{ github.ref_name }}" > release_notes.md
          echo "" >> release_notes.md

          # 3. Extract Features (looks for commits starting with feat, feature, add, added, new)
          echo "## 🚀 Features" >> release_notes.md
          git log ${PREV_TAG}..HEAD --pretty=format:"* %s ([%h](https://github.com/${{ github.repository }}/commit/%H))" | grep -i -E "^\* (feat|feature|add|added|new)" >> release_notes.md || echo "* No new features in this release." >> release_notes.md
          echo "" >> release_notes.md

          # 4. Extract Bug Fixes (looks for commits starting with fix, bug, patch, fixed)
          echo "## 🐛 Bug Fixes" >> release_notes.md
          git log ${PREV_TAG}..HEAD --pretty=format:"* %s ([%h](https://github.com/${{ github.repository }}/commit/%H))" | grep -i -E "^\* (fix|bug|patch|fixed|resolved)" >> release_notes.md || echo "* No bug fixes in this release." >> release_notes.md
          echo "" >> release_notes.md

          # 5. Extract everything else
          echo "## 📝 Other Commits" >> release_notes.md
          git log ${PREV_TAG}..HEAD --pretty=format:"* %s ([%h](https://github.com/${{ github.repository }}/commit/%H))" | grep -v -i -E "^\* (feat|feature|add|added|new|fix|bug|patch|fixed|resolved)" >> release_notes.md || echo "* No other changes." >> release_notes.md

      - name: Create ZIP Archive
        run: |
          zip -r waec-grinder-${{ github.ref_name }}.zip . \
            -x "*.git*" \
            -x "*.github*" \
            -x "*.jules*" \
            -x "*tests/*" \
            -x "*.env" \
            -x "*__pycache__*" \
            -x "*.pytest_cache*" \
            -x "release_notes.md"

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: waec-grinder-${{ github.ref_name }}.zip
          body_path: release_notes.md # Injects our custom generated markdown file
