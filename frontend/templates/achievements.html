{% extends "base.html" %}
{% block title %}Achievements — WAEC Grinder{% endblock %}

{% block content %}
<div class="container" style="padding-top: 60px; padding-bottom: 80px;">

  <div style="margin-bottom: 48px;">
    <h1 style="font-size: 2.5rem; margin-bottom: 12px;">Your Achievements</h1>
    <p style="color: var(--text-secondary);">Track your consistency and milestones as you prepare for the WAEC 2025.</p>
  </div>

  <div class="stats-grid" style="margin-bottom: 48px;">
    <div class="stat-card">
      <div class="stat-card__value" id="stats-streak">0</div>
      <div class="stat-card__label">Current Streak</div>
    </div>
    <div class="stat-card">
      <div class="stat-card__value" id="stats-obj">0</div>
      <div class="stat-card__label">OBJs Mastered</div>
    </div>
    <div class="stat-card">
      <div class="stat-card__value" id="stats-theory">0</div>
      <div class="stat-card__label">Theories Passed</div>
    </div>
  </div>

  <div id="achievements-grid" style="display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px;">
    <!-- Achievements will be injected here -->
  </div>

</div>

<style>
  .achievement-card {
    display: flex;
    gap: 16px;
    align-items: center;
    padding: 20px;
    background: var(--bg-card);
    border: 1px solid var(--border-subtle);
    border-radius: var(--radius-lg);
    transition: all 0.2s ease;
    height: 100%;
  }
  .achievement-card--locked {
    opacity: 0.5;
    filter: grayscale(1);
    background: rgba(255,255,255,0.02);
  }
  .achievement-card__icon {
    font-size: 2.5rem;
    width: 60px;
    height: 60px;
    display: flex;
    align-items: center;
    justify-content: center;
    background: var(--bg-base);
    border-radius: 12px;
    border: 1px solid var(--border-subtle);
  }
  .achievement-card__body {
    flex: 1;
  }
  .achievement-card__title {
    font-weight: 700;
    font-size: 1rem;
    margin-bottom: 4px;
    color: var(--text-primary);
  }
  .achievement-card__desc {
    font-size: 0.85rem;
    color: var(--text-secondary);
    line-height: 1.4;
  }
  .stats-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 20px;
  }
  .stat-card {
    background: var(--bg-card);
    border: 1px solid var(--border-subtle);
    padding: 24px;
    border-radius: var(--radius-lg);
    text-align: center;
  }
  .stat-card__value {
    font-size: 2rem;
    font-weight: 800;
    color: var(--accent);
    margin-bottom: 4px;
  }
  .stat-card__label {
    font-size: 0.8rem;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    color: var(--text-muted);
    font-weight: 600;
  }
  @media (max-width: 640px) {
    .stats-grid { grid-template-columns: 1fr; }
  }
</style>
{% endblock %}

{% block scripts %}
<script type="module">
  import Storage from '/static/js/storage.js';
  import AchievementEngine from '/static/js/achievements.js';

  async function init() {
    // Update nav stats immediately
    updateNavDisplay();

    // Check for social achievement if they have been to multiplayer
    if (sessionStorage.getItem('wg_player_uuid')) {
      Storage.setMultiplayerDone();
    }

    // Run a fresh check to catch any missed achievements (syncing stats to badges)
    runFreshCheck();

    const globalStats = Storage.getGlobalStats();
    const streak = Storage.getStreak();
    const earnedIds = Storage.getAchievements();

    // Update stats display
    document.getElementById('stats-streak').textContent = streak;
    document.getElementById('stats-obj').textContent = globalStats.mastered_obj;
    document.getElementById('stats-theory').textContent = globalStats.mastered_theory;

    const grid = document.getElementById('achievements-grid');
    grid.innerHTML = '';

    const allAchievements = AchievementEngine.ACHIEVEMENTS;

    allAchievements.forEach(ach => {
      const isEarned = earnedIds.includes(ach.id);
      const card = document.createElement('div');
      card.className = `achievement-card ${isEarned ? '' : 'achievement-card--locked'}`;

      card.innerHTML = `
        <div class="achievement-card__icon">${ach.icon}</div>
        <div class="achievement-card__body">
          <div class="achievement-card__title">${ach.title}</div>
          <div class="achievement-card__desc">${ach.description}</div>
        </div>
      `;
      grid.appendChild(card);
    });
  }

  function runFreshCheck() {
    try {
      const globalStats = Storage.getGlobalStats();
      const streak = Storage.getStreak();
      const earnedIds = Storage.getAchievements();
      const now = new Date();
      const hour = now.getHours();
      const day = now.getDay();

      const checkStats = {
        streak: streak,
        mastered_obj: globalStats.mastered_obj,
        mastered_theory: globalStats.mastered_theory,
        subject_done: false, // Default to false for fresh check
        isEarlyBird: hour < 8,
        isNightOwl: hour >= 22,
        isWeekend: day === 0 || day === 6,
        perfectBatchSize: 0,
        isComeback: false,
        subject_mastered_count: Storage.getStats().mastered,
        subjects_started: Storage.getSubjectsStartedCount(),
        isMultiplayer: Storage.isMultiplayerDone()
      };

      // Try to get subject_done safely
      try {
        checkStats.subject_done = Storage.isAllDone('both');
      } catch (e) {}

      const newlyUnlocked = AchievementEngine.checkNew(checkStats, earnedIds);
      newlyUnlocked.forEach(ach => {
        Storage.saveAchievement(ach.id);
      });
    } catch (err) {
      console.error('[Achievements] Fresh check failed:', err);
    }
  }

  function updateNavDisplay() {
    const summary = Storage.getSessionSummary();
    const navMastered = document.getElementById('nav-mastered');
    const navFailed = document.getElementById('nav-failed');
    const navUnseen = document.getElementById('nav-unseen');
    const navStreak = document.getElementById('nav-streak');

    if (navMastered) navMastered.textContent = summary.stats.mastered;
    if (navFailed) navFailed.textContent = summary.failed_obj + summary.failed_theory;
    if (navUnseen) navUnseen.textContent = summary.unseen_obj + summary.unseen_theory;
    if (navStreak) navStreak.textContent = Storage.getStreak();
  }

  init();
</script>
{% endblock %}
