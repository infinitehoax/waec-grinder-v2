<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}WAEC Grinder{% endblock %}</title>

  <!-- Styles -->
  <link rel="stylesheet" href="{{ url_for('static', filename='css/variables.css') }}" />
  <link rel="stylesheet" href="{{ url_for('static', filename='vendor/katex.min.css') }}" />
  <link rel="stylesheet" href="{{ url_for('static', filename='css/main.css') }}" />
  <link rel="stylesheet" href="{{ url_for('static', filename='css/study.css') }}" />
</head>
<body>

  <!-- Navigation -->
  <nav class="nav">
    <div class="container nav__inner">
      <a href="/" class="nav__logo">
        <div class="nav__logo-icon">📚</div>
        WAEC <span>Grinder</span>
      </a>
      <div class="nav__stats">
        <div class="nav__stat">
          <span>Mastered</span>
          <strong id="nav-mastered">0</strong>
        </div>
        <div class="nav__stat">
          <span>Failed Queue</span>
          <strong id="nav-failed">0</strong>
        </div>
        <div class="nav__stat">
          <span>Unseen</span>
          <strong id="nav-unseen">0</strong>
        </div>
      </div>
    </div>
  </nav>

  <!-- Page Content -->
  {% block content %}{% endblock %}

  <!-- Toast Container -->
  <div id="toast-container"></div>

  <!-- Vendor Scripts -->
  <script src="{{ url_for('static', filename='vendor/marked.min.js') }}"></script>
  <script src="{{ url_for('static', filename='vendor/katex.min.js') }}"></script>

  {% block scripts %}{% endblock %}
</body>
</html>
